name: CI HFHockey

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci || npm install # fallback si package-lock est out of sync

    - name: Typecheck
      run: npm run typecheck
      
    - name: Run Tests
      run: npm run test -- --passWithNoTests
